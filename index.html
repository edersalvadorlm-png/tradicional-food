<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradicional Food</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background-image: url("https://i.postimg.cc/Hs89yQCR/fondo.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
}

.overlay{
background: rgba(0,0,0,0.75);
min-height:100vh;
}

.header{
padding:50px 20px 20px 20px;
}

.logo{
width:180px;
margin-bottom:20px;
}

h1{
color:#e63946;
margin:5px 0;
font-size:26px;
}

button{
background:#e63946;
color:white;
border:none;
padding:12px;
margin:10px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

button:hover{
background:#c1121f;
}

.menu{
display:none;
padding:20px;
max-width:500px;
margin:auto;
text-align:center;
}

.item{
margin:25px 0;
}

.item label{
display:block;
font-weight:bold;
margin-bottom:10px;
font-size:16px;
}

/* 🔥 BOTONES MÁS PEGADOS A LA CANTIDAD */
.qty{
display:flex;
justify-content:center;
align-items:center;
gap:5px;
}

.qty button{
width:32px;
height:32px;
font-size:18px;
padding:0;
border-radius:50%;
background:#e63946;
margin:0;
}

.qty input{
width:45px;
text-align:center;
font-size:16px;
border:none;
border-radius:5px;
padding:5px;
margin:0;
}

input[type="text"], input[type="tel"], textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:8px;
font-size:14px;
}

.total{
font-size:28px;
margin:30px 0 10px 0;
color:#2a9d8f;
font-weight:bold;
}

#total{
font-size:40px;
}

.whatsapp{
background:#25D366;
}

.whatsapp:hover{
background:#1ebe5d;
}

.location-btn{
background:#0077b6;
}

.location-btn:hover{
background:#023e8a;
}
</style>
</head>
<body>

<div class="overlay">

<div class="header">
<img src="https://i.postimg.cc/nL6gfHZ0/logo.png" class="logo">
<h1>Tradicional Food</h1>
<p>Discada Norteña 100% Casera</p>
<button onclick="mostrarMenu()">🔥 HAZ TU PEDIDO 🔥</button>
</div>

<div class="menu" id="menu">

<!-- PRODUCTOS -->

<div class="item">
<label>Discada 1/2 litro - $150</label>
<div class="qty">
<button onclick="cambiarCantidad('p1',-1)">-</button>
<input type="number" value="0" id="p1" readonly>
<button onclick="cambiarCantidad('p1',1)">+</button>
</div>
</div>

<div class="item">
<label>Discada 1 litro - $250</label>
<div class="qty">
<button onclick="cambiarCantidad('p2',-1)">-</button>
<input type="number" value="0" id="p2" readonly>
<button onclick="cambiarCantidad('p2',1)">+</button>
</div>
</div>

<div class="item">
<label>1 litro Salsa - $120</label>
<div class="qty">
<button onclick="cambiarCantidad('p3',-1)">-</button>
<input type="number" value="0" id="p3" readonly>
<button onclick="cambiarCantidad('p3',1)">+</button>
</div>
</div>

<div class="item">
<label>1/2 litro Salsa - $60</label>
<div class="qty">
<button onclick="cambiarCantidad('p4',-1)">-</button>
<input type="number" value="0" id="p4" readonly>
<button onclick="cambiarCantidad('p4',1)">+</button>
</div>
</div>

<div class="item">
<label>Extra tortillas - $20</label>
<div class="qty">
<button onclick="cambiarCantidad('p5',-1)">-</button>
<input type="number" value="0" id="p5" readonly>
<button onclick="cambiarCantidad('p5',1)">+</button>
</div>
</div>

<div class="item">
<label>Extra salsa - $15</label>
<div class="qty">
<button onclick="cambiarCantidad('p6',-1)">-</button>
<input type="number" value="0" id="p6" readonly>
<button onclick="cambiarCantidad('p6',1)">+</button>
</div>
</div>

<!-- TOTAL -->
<div class="total">
Total: $<span id="total">0</span>
</div>

<!-- NOMBRE -->
<div class="item">
<label>Nombre</label>
<input type="text" id="nombre" placeholder="Escribe tu nombre">
</div>

<!-- TELEFONO -->
<div class="item">
<label>Teléfono</label>
<input type="tel" id="telefono" placeholder="Tu número de contacto">
</div>

<!-- DIRECCIÓN -->
<div class="item">
<label>📍 Dirección y referencias</label>
<textarea id="referencia" placeholder="Casa azul, número 24, privada Los Pinos..."></textarea>
</div>

<button class="location-btn" onclick="obtenerUbicacion()">📍 Enviar ubicación actual</button>
<button class="whatsapp" onclick="enviarPedido()">HACER PEDIDO POR WHATSAPP</button>

</div>
</div>

<script>

let ubicacionLink = "";

function mostrarMenu(){
document.getElementById("menu").style.display="block";
}

function cambiarCantidad(id,valor){
let input=document.getElementById(id);
let cantidad=parseInt(input.value)+valor;
if(cantidad<0)cantidad=0;
input.value=cantidad;
calcular();
}

function calcular(){
let total=
(p1.value*150)+
(p2.value*250)+
(p3.value*120)+
(p4.value*60)+
(p5.value*20)+
(p6.value*15);
document.getElementById("total").innerText=total;
}

function obtenerUbicacion(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(position){
let lat=position.coords.latitude;
let lon=position.coords.longitude;
ubicacionLink="https://www.google.com/maps?q="+lat+","+lon;
alert("Ubicación agregada correctamente ✅");
});
}
}

function enviarPedido(){
let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;

let pedido="Hola, quiero hacer el siguiente pedido:%0A%0A";

if(nombre)pedido+="Nombre: "+nombre+"%0A";
if(telefono)pedido+="Teléfono: "+telefono+"%0A";

pedido+="%0A";

let total=0;

if(p1.value>0){pedido+=p1.value+" Discada 1/2 litro%0A";total+=p1.value*150;}
if(p2.value>0){pedido+=p2.value+" Discada 1 litro%0A";total+=p2.value*250;}
if(p3.value>0){pedido+=p3.value+" 1 litro Salsa%0A";total+=p3.value*120;}
if(p4.value>0){pedido+=p4.value+" 1/2 litro Salsa%0A";total+=p4.value*60;}
if(p5.value>0){pedido+=p5.value+" Extra tortillas%0A";total+=p5.value*20;}
if(p6.value>0){pedido+=p6.value+" Extra salsa%0A";total+=p6.value*15;}

pedido+="Total: $"+total+"%0A";

let referencia=document.getElementById("referencia").value;
if(referencia)pedido+="Dirección: "+referencia+"%0A";
if(ubicacionLink)pedido+="Ubicación: "+ubicacionLink;

window.open("https://wa.me/528181799894?text="+pedido,"_blank");
}

</script>

</body>
</html>
