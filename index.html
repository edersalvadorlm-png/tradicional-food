<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discada Norteña</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background-image: url("https://i.postimg.cc/Hs89yQCR/fondo.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
overflow-x:hidden;
}

.overlay{
background: rgba(0,0,0,0.75);
min-height:100vh;
}

/* HEADER */
.header{
padding:20px;
}

.logo{
width:180px;
margin-bottom:10px;
}

h1{
margin:0;
font-size:26px;
}

/* TEXTO DORADO */
.info-venta{
font-size:16px;
font-weight:bold;
margin-top:5px;
margin-bottom:18px;
background: linear-gradient(180deg, #ffd166 0%, #fca311 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
}

/* BOTONES */
.btn-principal{
background:#e63946;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.btn-principal:hover{ background:#c1121f; }

.btn-negro{
background:black;
color:white;
border:2px solid white;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.btn-negro:hover{
background:#111;
box-shadow:0 0 8px white;
}

/* SECCIONES */
.seccion-extra, .menu{
display:none;
padding:20px;
max-width:500px;
margin:auto;
height:85vh;
overflow-y:auto;
position:relative;
}

.flecha{
position:sticky;
top:0;
text-align:right;
font-size:26px;
cursor:pointer;
}

.seccion-extra img{
width:100%;
border-radius:10px;
margin-top:15px;
}

/* CUENTA */
.cuenta-box{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.cuenta-numero{
font-size:22px;
font-weight:bold;
margin:10px 0;
word-break:break-all;
}

/* MENU */
.item{ margin:25px 0; }

.item label{
display:block;
font-weight:bold;
margin-bottom:10px;
font-size:16px;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:5px;
}

.qty button{
width:32px;
height:32px;
font-size:18px;
border-radius:50%;
background:#e63946;
color:white;
border:none;
cursor:pointer;
}

.qty input{
width:45px;
text-align:center;
font-size:16px;
border:none;
border-radius:5px;
padding:5px;
}

input, textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:8px;
font-size:14px;
}

.total{
font-size:28px;
margin:30px 0 10px 0;
color:#2a9d8f;
font-weight:bold;
}

#total{ font-size:40px; }

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.location-btn{
background:#0077b6;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}
</style>
</head>

<body>
<div class="overlay">

<div class="header">
<img src="https://i.postimg.cc/nL6gfHZ0/logo.png" class="logo">
<h1>Discada Norteña</h1>

<div class="info-venta">
Venta Sábado y Domingo<br>
Horario de 1:00 pm a 4:00 pm
</div>

<button class="btn-negro" onclick="mostrarSeccion('promociones')">PROMOCIONES</button>
<button class="btn-principal" onclick="mostrarSeccion('menu')">🔥 HAZ TU PEDIDO 🔥</button>
<button class="btn-negro" onclick="mostrarSeccion('ingredientes')">🍳 Ingredientes</button>
<button class="btn-negro" onclick="mostrarSeccion('transferencia')">💳 Cuenta para transferencias</button>
</div>

<!-- PROMOCIONES -->
<div class="seccion-extra" id="promociones">
<div class="flecha" onclick="cerrarSecciones()">⬅️</div>
<img src="https://i.postimg.cc/bwCHt1qb/Litro.png">
<img src="https://i.postimg.cc/cJPRDZgH/Medio-litro.png">
</div>

<!-- INGREDIENTES -->
<div class="seccion-extra" id="ingredientes">
<div class="flecha" onclick="cerrarSecciones()">⬅️</div>
<img src="https://i.postimg.cc/CLjBHS7D/Ingredientes.png">
</div>

<!-- TRANSFERENCIA -->
<div class="seccion-extra" id="transferencia">
<div class="flecha" onclick="cerrarSecciones()">⬅️</div>
<div class="cuenta-box">
<div><strong>Banco:</strong> Santander</div>
<div class="cuenta-numero" id="cuenta">5579100370090225</div>
<button onclick="copiarCuenta()">Copiar cuenta</button>
</div>
<img src="https://i.postimg.cc/sgrnwfR0/Transferencias.png">
</div>

<!-- MENU ORIGINAL COMPLETO -->
<div class="menu" id="menu">
<div class="flecha" onclick="cerrarSecciones()">⬅️</div>

<div class="item">
<label>Discada 1/2 litro - $150</label>
<div class="qty">
<button onclick="cambiarCantidad('p1',-1)">-</button>
<input type="number" value="0" id="p1" readonly>
<button onclick="cambiarCantidad('p1',1)">+</button>
</div>
</div>

<div class="item">
<label>Discada 1 litro - $250</label>
<div class="qty">
<button onclick="cambiarCantidad('p2',-1)">-</button>
<input type="number" value="0" id="p2" readonly>
<button onclick="cambiarCantidad('p2',1)">+</button>
</div>
</div>

<div class="item">
<label>1 litro Salsa - $120</label>
<div class="qty">
<button onclick="cambiarCantidad('p3',-1)">-</button>
<input type="number" value="0" id="p3" readonly>
<button onclick="cambiarCantidad('p3',1)">+</button>
</div>
</div>

<div class="item">
<label>1/2 litro Salsa - $60</label>
<div class="qty">
<button onclick="cambiarCantidad('p4',-1)">-</button>
<input type="number" value="0" id="p4" readonly>
<button onclick="cambiarCantidad('p4',1)">+</button>
</div>
</div>

<div class="item">
<label>Extra tortillas - $20</label>
<div class="qty">
<button onclick="cambiarCantidad('p5',-1)">-</button>
<input type="number" value="0" id="p5" readonly>
<button onclick="cambiarCantidad('p5',1)">+</button>
</div>
</div>

<div class="item">
<label>Extra salsa - $15</label>
<div class="qty">
<button onclick="cambiarCantidad('p6',-1)">-</button>
<input type="number" value="0" id="p6" readonly>
<button onclick="cambiarCantidad('p6',1)">+</button>
</div>
</div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<div class="item">
<label>Nombre</label>
<input type="text" id="nombre" placeholder="Escribe tu nombre">
</div>

<div class="item">
<label>Teléfono</label>
<input type="tel" id="telefono" placeholder="Tu número de contacto">
</div>

<div class="item">
<label>📍 Dirección y referencias</label>
<textarea id="referencia" placeholder="Casa azul, número 24..."></textarea>
</div>

<button class="location-btn" onclick="obtenerUbicacion()">📍 Enviar ubicación actual</button>
<button class="whatsapp" onclick="enviarPedido()">HACER PEDIDO POR WHATSAPP</button>
</div>

</div>

<script>
let ubicacionLink = "";

function mostrarSeccion(id){
cerrarSecciones();
document.getElementById(id).style.display="block";
}

function cerrarSecciones(){
["menu","ingredientes","transferencia","promociones"].forEach(id=>{
let el=document.getElementById(id);
if(el) el.style.display="none";
});
}

function copiarCuenta(){
let texto=document.getElementById("cuenta").innerText;
navigator.clipboard.writeText(texto);
alert("Cuenta copiada ✅");
}

function cambiarCantidad(id,valor){
let input=document.getElementById(id);
let cantidad=parseInt(input.value)+valor;
if(cantidad<0)cantidad=0;
input.value=cantidad;
calcular();
}

function calcular(){
let total=(p1.value*150)+(p2.value*250)+(p3.value*120)+(p4.value*60)+(p5.value*20)+(p6.value*15);
document.getElementById("total").innerText=total;
}

function obtenerUbicacion(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(position){
let lat=position.coords.latitude;
let lon=position.coords.longitude;
ubicacionLink="https://www.google.com/maps?q="+lat+","+lon;
alert("Ubicación agregada correctamente ✅");
});
}
}

function enviarPedido(){
let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let pedido="Hola, quiero hacer el siguiente pedido:%0A%0A";
if(nombre)pedido+="Nombre: "+nombre+"%0A";
if(telefono)pedido+="Teléfono: "+telefono+"%0A";
pedido+="%0A";
let total=0;
if(p1.value>0){pedido+=p1.value+" Discada 1/2 litro%0A";total+=p1.value*150;}
if(p2.value>0){pedido+=p2.value+" Discada 1 litro%0A";total+=p2.value*250;}
if(p3.value>0){pedido+=p3.value+" 1 litro Salsa%0A";total+=p3.value*120;}
if(p4.value>0){pedido+=p4.value+" 1/2 litro Salsa%0A";total+=p4.value*60;}
if(p5.value>0){pedido+=p5.value+" Extra tortillas%0A";total+=p5.value*20;}
if(p6.value>0){pedido+=p6.value+" Extra salsa%0A";total+=p6.value*15;}
pedido+="Total: $"+total+"%0A";
let referencia=document.getElementById("referencia").value;
if(referencia)pedido+="Dirección: "+referencia+"%0A";
if(ubicacionLink)pedido+="Ubicación: "+ubicacionLink;
window.open("https://wa.me/528181799894?text="+pedido,"_blank");
}
</script>

</body>
</html>
