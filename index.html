<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discada Norteña</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background-image: url("https://i.postimg.cc/Hs89yQCR/fondo.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
overflow-x:hidden;
}

.overlay{
background: rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:40px;
}

.logo{
width:180px;
margin-top:15px;
margin-bottom:5px;
}

h1{
margin:0;
font-size:28px;
}

/* TEXTO DORADO */
.info-venta{
font-size:16px;
font-weight:bold;
margin-top:5px;
margin-bottom:18px;
background: linear-gradient(180deg, #ffd166 0%, #fca311 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
}

/* BOTONES */
.btn-principal{
background:#e63946;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.btn-principal:hover{
background:#c1121f;
}

.btn-negro{
background:black;
color:white;
border:2px solid white;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.btn-negro:hover{
background:#111;
box-shadow:0 0 8px white;
}

/* SECCIONES */
.seccion{
display:none;
padding:20px;
max-width:500px;
margin:auto;
height:85vh;
overflow-y:auto;
position:relative;
}

.flecha{
position:sticky;
top:0;
text-align:right;
font-size:26px;
cursor:pointer;
}

/* MENU ITEMS */
.item{
margin:25px 0;
}

.item label{
display:block;
font-weight:bold;
margin-bottom:10px;
font-size:16px;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:5px;
}

.qty button{
width:32px;
height:32px;
font-size:18px;
border-radius:50%;
background:#e63946;
color:white;
border:none;
cursor:pointer;
}

.qty input{
width:45px;
text-align:center;
font-size:16px;
border:none;
border-radius:5px;
padding:5px;
}

input, textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:8px;
font-size:14px;
}

.total{
font-size:28px;
margin:25px 0 10px 0;
color:#2a9d8f;
font-weight:bold;
}

#total{
font-size:40px;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}
</style>
</head>

<body>
<div class="overlay">

<img src="https://i.postimg.cc/nL6gfHZ0/logo.png" class="logo">
<h1>Discada Norteña</h1>

<div class="info-venta">
Venta Sábado y Domingo<br>
Horario de 1:00 pm a 4:00 pm
</div>

<button class="btn-negro" onclick="mostrar('promociones')">PROMOCIONES</button>
<button class="btn-principal" onclick="mostrar('menu')">🔥 HAZ TU PEDIDO 🔥</button>
<button class="btn-negro" onclick="mostrar('ingredientes')">INGREDIENTES</button>
<button class="btn-negro" onclick="mostrar('cuenta')">💳 CUENTA PARA TRANSFERENCIAS</button>

<!-- PROMOCIONES -->
<div class="seccion" id="promociones">
<div class="flecha" onclick="cerrar()">⬅️</div>
<img src="https://i.postimg.cc/bwCHt1qb/Litro.png" width="100%">
<img src="https://i.postimg.cc/cJPRDZgH/Medio-litro.png" width="100%">
</div>

<!-- INGREDIENTES -->
<div class="seccion" id="ingredientes">
<div class="flecha" onclick="cerrar()">⬅️</div>
<img src="https://i.postimg.cc/CLjBHS7D/Ingredientes.png" width="100%">
</div>

<!-- CUENTA -->
<div class="seccion" id="cuenta">
<div class="flecha" onclick="cerrar()">⬅️</div>
<h3>Banco: Santander</h3>
<p style="font-size:22px;font-weight:bold;">5579100370090225</p>
<img src="https://i.postimg.cc/sgrnwfR0/Transferencias.png" width="100%">
</div>

<!-- MENU PEDIDOS -->
<div class="seccion" id="menu">
<div class="flecha" onclick="cerrar()">⬅️</div>

<div class="item">
<label>Litro - $180</label>
<div class="qty">
<button onclick="cambiar('litro',-1)">-</button>
<input type="number" id="litro" value="0" min="0" onchange="actualizar()">
<button onclick="cambiar('litro',1)">+</button>
</div>
</div>

<div class="item">
<label>Medio Litro - $100</label>
<div class="qty">
<button onclick="cambiar('medio',-1)">-</button>
<input type="number" id="medio" value="0" min="0" onchange="actualizar()">
<button onclick="cambiar('medio',1)">+</button>
</div>
</div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<input type="text" id="nombre" placeholder="Tu nombre">
<input type="tel" id="telefono" placeholder="Tu teléfono">
<textarea id="direccion" placeholder="Dirección de entrega"></textarea>

<button class="whatsapp" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
</div>

</div>

<script>
function mostrar(id){
document.querySelectorAll('.seccion').forEach(sec=>sec.style.display="none");
document.getElementById(id).style.display="block";
}

function cerrar(){
document.querySelectorAll('.seccion').forEach(sec=>sec.style.display="none");
}

function cambiar(id,valor){
let input=document.getElementById(id);
let nuevo=parseInt(input.value)+valor;
if(nuevo<0) nuevo=0;
input.value=nuevo;
actualizar();
}

function actualizar(){
let litro=parseInt(document.getElementById("litro").value)||0;
let medio=parseInt(document.getElementById("medio").value)||0;
let total=(litro*180)+(medio*100);
document.getElementById("total").innerText=total;
}

function enviarPedido(){
let litro=document.getElementById("litro").value;
let medio=document.getElementById("medio").value;
let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let direccion=document.getElementById("direccion").value;
let total=document.getElementById("total").innerText;

if(total==0){
alert("Agrega productos al pedido");
return;
}

let mensaje="Pedido Discada Norteña:%0A";
if(litro>0) mensaje+="Litro x"+litro+"%0A";
if(medio>0) mensaje+="Medio Litro x"+medio+"%0A";
mensaje+="Total: $"+total+"%0A%0A";
mensaje+="Nombre: "+nombre+"%0A";
mensaje+="Teléfono: "+telefono+"%0A";
mensaje+="Dirección: "+direccion;

window.open("https://wa.me/5218110000000?text="+mensaje,"_blank");
}
</script>

</body>
</html>
