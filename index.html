<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discada Norteña</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background-image: url("https://i.postimg.cc/Hs89yQCR/fondo.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
overflow-x:hidden;
}

.overlay{
background: rgba(0,0,0,0.75);
min-height:100vh;
}

.header{
padding:10px 20px 10px 20px;
}

.logo{
width:180px;
margin-bottom:5px;
}

h1{
color:white;
margin:0 0 15px 0;
font-size:28px;
}

/* BOTÓN PRINCIPAL */
.btn-principal{
background:#e63946;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.btn-principal:hover{
background:#c1121f;
}

/* BOTONES NEGROS NUEVOS */
.btn-negro{
background:black;
color:white;
border:2px solid white;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.btn-negro:hover{
background:#111;
box-shadow:0 0 8px white;
}

.seccion-extra, .menu{
display:none;
padding:20px;
max-width:500px;
margin:auto;
height:85vh;
overflow-y:auto;
position:relative;
}

.seccion-extra img{
width:100%;
border-radius:10px;
margin-top:15px;
}

.flecha-regresar{
position:sticky;
top:0;
text-align:right;
font-size:26px;
cursor:pointer;
padding:5px 10px;
}

.cuenta-box{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.cuenta-numero{
font-size:22px;
font-weight:bold;
margin:10px 0;
word-break:break-all;
}

.btn-copiar{
background:#2a9d8f;
color:white;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.item{
margin:25px 0;
}

.item label{
display:block;
font-weight:bold;
margin-bottom:10px;
font-size:16px;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:5px;
}

.qty button{
width:32px;
height:32px;
font-size:18px;
padding:0;
border-radius:50%;
background:#e63946;
color:white;
border:none;
cursor:pointer;
}

.qty input{
width:45px;
text-align:center;
font-size:16px;
border:none;
border-radius:5px;
padding:5px;
margin:0;
}

input[type="text"], input[type="tel"], textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:8px;
font-size:14px;
}

.total{
font-size:28px;
margin:30px 0 10px 0;
color:#2a9d8f;
font-weight:bold;
}

#total{
font-size:40px;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.whatsapp:hover{
background:#1ebe5d;
}

.location-btn{
background:#0077b6;
color:white;
border:none;
padding:12px;
margin:8px auto;
width:85%;
font-size:16px;
border-radius:10px;
cursor:pointer;
display:block;
}

.location-btn:hover{
background:#023e8a;
}
</style>
</head>
<body>

<div class="overlay">

<div class="header">
<img src="https://i.postimg.cc/nL6gfHZ0/logo.png" class="logo">
<h1>Discada Norteña</h1>

<button class="btn-negro" onclick="toggleSeccion('promociones')">PROMOCIONES</button>
<button class="btn-principal" onclick="toggleSeccion('menu')">🔥 HAZ TU PEDIDO 🔥</button>
<button class="btn-negro" onclick="toggleSeccion('ingredientes')">INGREDIENTES</button>
<button class="btn-negro" onclick="toggleSeccion('transferencia')">CUENTA PARA TRANSFERENCIAS</button>
</div>

<!-- PROMOCIONES -->
<div class="seccion-extra" id="promociones">
<div class="flecha-regresar" onclick="cerrarSeccion()">⬅️</div>
<img src="https://i.postimg.cc/bwCHt1qb/Litro.png">
<img src="https://i.postimg.cc/cJPRDZgH/Medio-litro.png">
</div>

<!-- INGREDIENTES -->
<div class="seccion-extra" id="ingredientes">
<div class="flecha-regresar" onclick="cerrarSeccion()">⬅️</div>
<img src="https://i.postimg.cc/CLjBHS7D/Ingredientes.png">
</div>

<!-- TRANSFERENCIA -->
<div class="seccion-extra" id="transferencia">
<div class="flecha-regresar" onclick="cerrarSeccion()">⬅️</div>
<div class="cuenta-box">
<div><strong>Banco:</strong> Santander</div>
<div class="cuenta-numero" id="cuenta">5579100370090225</div>
<button class="btn-copiar" onclick="copiarCuenta()">Copiar cuenta</button>
</div>
<img src="https://i.postimg.cc/sgrnwfR0/Transferencias.png">
</div>

<!-- MENU -->
<div class="menu" id="menu">
<div class="flecha-regresar" onclick="cerrarSeccion()">⬅️</div>

<!-- (Aquí va exactamente tu menú original sin cambios funcionales) -->

</div>
</div>

<script>
let ubicacionLink = "";

function toggleSeccion(id){
let secciones = ["menu","ingredientes","transferencia","promociones"];
secciones.forEach(function(sec){
document.getElementById(sec).style.display="none";
});
document.getElementById(id).style.display="block";
}

function cerrarSeccion(){
let secciones = ["menu","ingredientes","transferencia","promociones"];
secciones.forEach(function(sec){
document.getElementById(sec).style.display="none";
});
}

function copiarCuenta(){
let texto = document.getElementById("cuenta").innerText;
navigator.clipboard.writeText(texto);
alert("Cuenta copiada ✅");
}
</script>

</body>
</html>
