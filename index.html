<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradicional Food</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
text-align:center;
}

.header{
padding:50px 20px 20px 20px;
}

.logo{
width:180px;
margin-bottom:20px;
}

h1{
color:#e63946;
margin:5px 0;
font-size:26px;
}

button{
background:#e63946;
color:white;
border:none;
padding:15px;
margin:20px auto;
width:85%;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
display:block;
}

button:hover{
background:#c1121f;
}

.menu{
display:none;
padding:20px;
max-width:500px;
margin:auto;
text-align:left;
}

.item{
margin:20px 0;
}

.qty{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
}

.qty input{
width:70px;
text-align:center;
font-size:16px;
padding:6px;
border-radius:5px;
border:none;
}

.total{
font-size:24px;
margin-top:25px;
color:#2a9d8f;
text-align:center;
font-weight:bold;
}

.whatsapp{
background:#25D366;
}

.whatsapp:hover{
background:#1ebe5d;
}
</style>
</head>
<body>

<div class="header">

<img src="https://i.postimg.cc/nL6gfHZ0/logo.png" class="logo">

<h1>Tradicional Food</h1>
<p>Discada Norteña 100% Casera</p>

<button onclick="mostrarMenu()">🔥 HAZ TU PEDIDO 🔥</button>

</div>

<div class="menu" id="menu">

<div class="item">
<label>Discada 1/2 litro - $150</label>
<div class="qty">
<input type="number" min="0" value="0" id="p1" onchange="calcular()">
</div>
</div>

<div class="item">
<label>Discada 1 litro - $250</label>
<div class="qty">
<input type="number" min="0" value="0" id="p2" onchange="calcular()">
</div>
</div>

<div class="item">
<label>1 litro Salsa - $120</label>
<div class="qty">
<input type="number" min="0" value="0" id="p3" onchange="calcular()">
</div>
</div>

<div class="item">
<label>1/2 litro Salsa - $60</label>
<div class="qty">
<input type="number" min="0" value="0" id="p4" onchange="calcular()">
</div>
</div>

<div class="item">
<label>Extra tortillas - $20</label>
<div class="qty">
<input type="number" min="0" value="0" id="p5" onchange="calcular()">
</div>
</div>

<div class="item">
<label>Extra salsa - $15</label>
<div class="qty">
<input type="number" min="0" value="0" id="p6" onchange="calcular()">
</div>
</div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="whatsapp" onclick="enviarPedido()">HACER PEDIDO POR WHATSAPP</button>

</div>

<script>

function mostrarMenu(){
document.getElementById("menu").style.display="block";
window.scrollTo(0,document.body.scrollHeight);
}

function calcular(){
let total = 
(p1.value * 150) +
(p2.value * 250) +
(p3.value * 120) +
(p4.value * 60) +
(p5.value * 20) +
(p6.value * 15);

document.getElementById("total").innerText = total;
}

function enviarPedido(){

let pedido="Hola, quiero hacer el siguiente pedido:%0A";
let total=0;

if(p1.value>0){ pedido+= p1.value+" Discada 1/2 litro%0A"; total+=p1.value*150;}
if(p2.value>0){ pedido+= p2.value+" Discada 1 litro%0A"; total+=p2.value*250;}
if(p3.value>0){ pedido+= p3.value+" 1 litro Salsa%0A"; total+=p3.value*120;}
if(p4.value>0){ pedido+= p4.value+" 1/2 litro Salsa%0A"; total+=p4.value*60;}
if(p5.value>0){ pedido+= p5.value+" Extra tortillas%0A"; total+=p5.value*20;}
if(p6.value>0){ pedido+= p6.value+" Extra salsa%0A"; total+=p6.value*15;}

pedido+="Total: $"+total;

window.open("https://wa.me/528181799894?text="+pedido,"_blank");
}

</script>

</body>
</html>
